<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Healert Backstage Plugin — In Action</title>
<link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@300;400;500;600&family=Syne:wght@600;700;800&display=swap" rel="stylesheet"/>
<style>
:root{
  --t:#0D9488;--td:#0F766E;--tl:rgba(13,148,136,.08);
  --a:#F59E0B;--al:rgba(245,158,11,.06);
  --g:#10B981;--r:#EF4444;
  --bg:#E8E8E8;--s1:#060E1A;--s2:#0A1525;
  --br:rgba(232,232,232);--br2:rgba(232,232,232);
  --tx:#F1F5F9;--txm:#94A3B8;--txs:#475569;
}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth;font-size:25px}
body{font-family:'DIN Alternate',sans-serif;background:var(--bg);color:var(--tx);overflow-x:hidden}
::selection{background:var(--tl);color:var(--t)}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:var(--txs)}

@keyframes fadeUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.7}}
@keyframes slideIn{from{transform:translateX(-20px);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

/* NAV */
nav{
  position:fixed;top:0;left:0;right:0;z-index:100;
  padding:0 5%;height:60px;display:flex;align-items:center;
  background:rgba(232,232,232);backdrop-filter:blur(12px);
  border-bottom:1px solid var(--br);
}
.nav-logo{font-size:20px;font-weight:800;letter-spacing:-.05em}
.nav-logo span{color:var(--t)}
.nav-right{margin-left:auto;display:flex;gap:12px}
.nav-btn{padding:8px 16px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;border:1px solid var(--br);background:transparent;color:var(--txm);transition:all .2s}
.nav-btn:hover{border-color:var(--t);color:var(--t)}
.nav-btn.cta{background:var(--t);color:#fff;border-color:var(--t);box-shadow:0 0 12px rgba(13,148,136,.3)}
.nav-btn.cta:hover{background:var(--td)}

/* HERO */
.hero{min-height:100vh;padding:100px 5% 60px;display:flex;flex-direction:column;justify-content:center;align-items:center;position:relative;overflow:hidden;text-align:center}
.hero-bg{position:absolute;inset:0;background:radial-gradient(ellipse 80% 60% at 50% 40%,rgba(13,148,136,.06) 0%,transparent 70%);pointer-events:none}
.hero-grid{position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,.02) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.02) 1px,transparent 1px);background-size:80px 80px;pointer-events:none}
.hero-inner{position:relative;z-2;max-width:900px;animation:fadeUp .8s ease both}

.hero h1{font-size:clamp(2.8rem,7vw,5rem);font-weight:700;letter-spacing:-.02em;line-height:0.95;margin-bottom:16px}
.hero h1 .t{color:var(--t)}

.hero-tag{font-size:12px;color:var(--txs);font-family:'DIN Alternate',monospace;letter-spacing:.1em;margin-bottom:20px}

.hero-desc{font-size:1.05rem;color:var(--txm);max-width:620px;margin:0 auto 40px;line-height:1.75}

.badge-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--t);
    animation: pulse 2s infinite; }


.badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: rgba(13, 148, 136, .1);
    border: 1px solid rgba(13, 148, 136, .2);
    border-radius: 100px;
    padding: 6px 16px;
    margin-bottom: 28px;
    font-size: 11px;
    font-weight: 600;
    color: var(--t);
    font-family: 'Geist Mono', monospace;
    letter-spacing: .12em;
    text-transform: uppercase;
}


.problem {
    padding: 100px 6%;
    background: var(--bg);
}

.s-title {
    font-size: clamp(2rem, 4vw, 3.2rem);
    font-weight: 800;
    letter-spacing: -.05em;
    line-height: 1.05;
    margin-bottom: 14px;
}

.container {
    max-width: 1140px;
    margin: 0 auto;
}

.section-head {
    margin-bottom: 56px;
}

element.style {
    transition-delay: 0s;
}


.s-eye {
    font-size: 11px;
    font-weight: 600;
    color: var(--t);
    letter-spacing: .18em;
    text-transform: uppercase;
    font-family: 'Geist Mono', monospace;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
}


.s-sub {
    font-size: 0.8rem;
    color: var(--txm);
    line-height: 1.75;
    max-width: 900px;
}

.hero-cta{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-bottom:40px}
.btn{padding:12px 24px;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;border:none;transition:all .2s}
.btn-primary{background:var(--t);color:#fff;box-shadow:0 0 16px rgba(13,148,136,.3)}
.btn-primary:hover{background:var(--td);transform:translateY(-2px);box-shadow:0 0 24px rgba(13,148,136,.5)}
.btn-secondary{background:transparent;border:1px solid var(--br);color:var(--txm)}
.btn-secondary:hover{border-color:var(--t);color:var(--t)}

.hero-note{font-size:11px;color:var(--txs);font-family:'DIN Alternate',monospace}




/* SECTION */
section{padding:80px 5%;position:relative}

/* FEATURES */
.features{background:var(--s1)}
.feat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;margin-top:40px}
.feat-card{background:var(--s2);border:1px solid var(--br);border-radius:12px;padding:24px;transition:all .2s}
.feat-card:hover{border-color:rgba(13,148,136,.3);transform:translateY(-4px)}
.feat-num{font-size:32px;font-weight:800;color:var(--t);margin-bottom:8px}
.feat-title{font-size:16px;font-weight:700;color:var(--tx);margin-bottom:8px}
.feat-desc{font-size:13px;color:var(--txm);line-height:1.6}

/* CTA */
.cta-section{padding:120px 5%;text-align:center;background:var(--bg)}
.cta-h{font-size:clamp(2rem,5vw,3.5rem);font-weight:800;letter-spacing:-.04em;margin-bottom:16px;line-height:1.1}
.cta-h .t{color:var(--t)}
.cta-sub{font-size:1.05rem;color:var(--txm);max-width:550px;margin:0 auto 32px;line-height:1.7}
.cta-actions{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}

/* FOOTER */
footer{background:var(--s1);border-top:1px solid var(--br);padding:40px 5%;text-align:center;font-size:12px;color:var(--txs);font-family:'DIN Alternate',monospace}

/* Responsive */
@media(max-width:768px){
  .feat-grid,.hm-row{grid-template-columns:1fr}
  .metrics-grid{grid-template-columns:repeat(2,1fr)}
  .hm-row{grid-template-columns:80px repeat(2,1fr)}
  nav{padding:0 4%}
  .nav-right .nav-btn:first-child{display:none}
}
</style>
</head>
