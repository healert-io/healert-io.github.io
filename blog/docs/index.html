<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Documentation - Healert</title>
  <style>
    /* RESET & CORE STYLES (Matches Healert Theme) */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: #fafaba; /* Replace with your primary website background color */
      color: #1a1a1a;
      line-height: 1.5;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    /* GLOBAL NAVIGATION BAR */
    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 40px;
      background: #ffffff;
      border-bottom: 1px solid rgba(0,0,0,0.05);
    }
    .nav-right {
      display: flex;
      align-items: center;
      gap: 20px;
    }
    .nav-btn {
      font-size: 16px;
      font-weight: 500;
      color: #4a4a4a;
      text-decoration: none;
      padding: 10px 20px;
      border-radius: 6px;
      transition: all 0.2s ease;
      background: transparent;
      border: none;
      cursor: pointer;
    }
    .nav-btn:hover {
      color: #000000;
    }
    
    /* The CTA Button matching your original 'Get Started' */
    .nav-btn.cta {
      background-color: #0070f3; /* Replace with your primary accent brand color */
      color: #ffffff;
      border: 1px solid transparent;
    }
    .nav-btn.cta:hover {
      background-color: #0051a8; /* Replace with your brand hover color */
      color: #ffffff;
    }

    /* MAIN HERO CONTENT */
    main {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 40px;
      text-align: center;
    }
    .content-box {
      max-width: 600px;
      padding: 40px;
      background: #ffffff;
      border-radius: 16px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.04);
    }
    .badge {
      display: inline-block;
      background: rgba(0, 112, 243, 0.1);
      color: #0070f3;
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 24px;
    }
    h1 {
      font-size: 36px;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: #111111;
      margin-bottom: 16px;
    }
    p {
      font-size: 16px;
      color: #666666;
      margin-bottom: 32px;
    }
    
    /* BACK BUTTON */
    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background-color: #111111;
      color: #ffffff;
      padding: 12px 28px;
      font-size: 16px;
      font-weight: 500;
      text-decoration: none;
      border-radius: 8px;
      transition: background 0.2s ease;
    }
    .back-btn:hover {
      background-color: #333333;
    }

    /* FOOTER */
    footer {
      padding: 24px;
      text-align: center;
      font-size: 14px;
      color: #888888;
      border-top: 1px solid rgba(0,0,0,0.05);
      background: #ffffff;
    }
  </style>
</head>
<body>

  <!-- NAV -->
  <nav>
    <!-- Keep your existing logo image tag below -->
    <img alt="Healert Logo" src="data:image/png;base64,iVBORw0KGgoAAA..." style="height: 40px;" />

    <div class="nav-right">
      <!-- Blog Navigator Link -->
      <a href="../blog/index.html" class="nav-btn" style="text-decoration: none; display: inline-flex; align-items: center;">Blog</a>
      
      <!-- Documentation Active Status Button -->
      <button class="nav-btn cta" onclick="window.location.reload();">Documentation</button>
    </div>
  </nav>

  <!-- MAIN BOX CONTENT -->
  <main>
    <div class="content-box">
      <div class="badge">In Progress</div>
      <h1>Documentation Available Soon</h1>
      <p>We are currently building comprehensive integration guides and resources to help you get the absolute most out of Healert. Check back shortly!</p>
      
      <!-- Back to Main Page Link -->
      <a href="../index.html" class="back-btn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
        Return Home
      </a>
    </div>
  </main>

  <!-- FOOTER -->
  <footer>
    &copy; 2026 Healert. All rights reserved.
  </footer>

</body>
</html>
