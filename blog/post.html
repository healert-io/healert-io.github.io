<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title id="page-title">Blog — Healert</title>
<meta id="page-desc" name="description" content="Healert blog post">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.2/marked.min.js"></script>
<style>
  /* Tokens copied verbatim from healert.io */
  :root{
    --t:#0D9488;--td:#0F766E;--tl:rgba(13,148,136,.08);
    --a:#F59E0B;--al:rgba(245,158,11,.06);
    --g:#10B981;--r:#EF4444;
    --bg:#E8E8E8;--s1:#060E1A;--s2:#0A1525;
    --br:rgba(232,232,232);--br2:rgba(232,232,232);
    --tx:#0d9488;--txm:#94A3B8;--txs:#475569;
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{font-family:'DIN Alternate',sans-serif;background:var(--bg);color:var(--tx);overflow-x:hidden;line-height:1.6}
  a{color:var(--t)}
  ::selection{background:var(--tl);color:var(--t)}
  .wrap{max-width:860px;margin:0 auto;padding:0 5%}
  .article-wrap{max-width:700px;margin:0 auto;padding:0 5%}

  nav{position:sticky;top:0;z-index:100;padding:0 5%;height:60px;display:flex;align-items:center;background:rgba(232,232,232,.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--br)}
  .nav-logo{font-size:20px;font-weight:800;letter-spacing:-.05em;color:var(--tx)}
  .nav-logo span{color:var(--t)}
  .nav-right{margin-left:auto;display:flex;gap:12px}
  .nav-btn{padding:8px 16px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;border:1px solid var(--br);background:transparent;color:var(--txm);transition:all .2s}
  .nav-btn:hover{border-color:var(--t);color:var(--t)}
  .nav-btn.active{color:var(--a);border-color:rgba(245,158,11,.35)}
  .nav-btn.cta{background:var(--t);color:#fff;border-color:var(--t);box-shadow:0 0 12px rgba(13,148,136,.3)}
  .nav-btn.cta:hover{background:var(--td)}

  .post-header{padding:48px 0 28px;border-bottom:1px solid var(--br)}
  .tags{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
  .tag{font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--a);border:1px solid rgba(245,158,11,.3);padding:3px 9px;border-radius:4px;background:var(--al);font-family:'Geist Mono',monospace}
  .post-meta{font-family:'Geist Mono',monospace;font-size:12px;color:var(--txs);display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-top:14px}
  .post-meta .dot{opacity:.5}

  article{padding:36px 0 20px;font-size:16px}
  article h1{font-family:'DIN Alternate',sans-serif;font-size:clamp(1.8rem,4.5vw,2.6rem);font-weight:800;letter-spacing:-.05em;line-height:1.15;margin:0 0 8px;color:var(--tx)}
  article h1+p{font-style:italic;color:var(--txm);font-size:1.05rem;margin-bottom:8px}
  article h2{font-family:'Geist Mono',monospace;font-weight:600;font-size:13px;letter-spacing:.12em;text-transform:uppercase;color:var(--a);margin:44px 0 16px}
  article p{line-height:1.85;color:var(--txm);margin:0 0 18px}
  article strong{font-weight:700;color:var(--txs)}
  article code{font-family:'Geist Mono',monospace;background:var(--tl);color:var(--td);padding:2px 6px;border-radius:4px;font-size:14px}
  article pre{background:var(--s1);color:#E8E8E8;border-radius:10px;padding:20px;overflow-x:auto;margin:8px 0 28px;font-family:'Geist Mono',monospace;font-size:13px;line-height:1.8}
  article pre code{background:none;color:inherit;padding:0}
  article blockquote{border-left:3px solid var(--t);padding:2px 0 2px 20px;margin:28px 0;font-weight:700;font-size:1.2rem;line-height:1.4;color:var(--tx)}
  article ul{margin:0 0 20px;padding-left:20px}
  article li{margin-bottom:8px;line-height:1.8;color:var(--txm)}
  article li::marker{color:var(--t)}
  article hr{border:none;border-top:1px solid var(--br);margin:36px 0}
  article a{text-decoration:underline}

  .loading{color:var(--txm);font-size:14px;font-family:'Geist Mono',monospace;padding:40px 0}

  .foot-eresidency{display:inline-flex;align-items:center;gap:8px;margin-top:14px;font-size:11px;color:var(--txm);letter-spacing:.04em}
  .foot-flag{width:20px;height:13px;border-radius:2px;border:1px solid var(--br);flex-shrink:0;display:block}
  .foot-links{display:flex;justify-content:center;gap:20px;margin-top:18px}
  .foot-links a{display:inline-flex;align-items:center;gap:6px;color:var(--txs);text-decoration:none;font-size:11px;letter-spacing:.06em;transition:color .2s}
  .foot-links a:hover{color:var(--t)}
  .foot-links svg{width:15px;height:15px;fill:currentColor}
  footer{background:var(--s1);border-top:1px solid var(--br);padding:40px 5%;text-align:center;font-size:12px;color:var(--txs);font-family:'DIN Alternate',monospace;margin-top:40px}

  @media(max-width:768px){
    nav{padding:0 4%}
    .nav-right .nav-btn:first-child{display:none}
    .post-header{padding:32px 0 20px}
  }
  @media(max-width:480px){
    nav{padding:0 4%;height:54px}
    .nav-btn{padding:7px 12px;font-size:12px}
  }
</style>
</head>
<body>

<nav>
  <a href="https://healert.io" class="nav-logo">HEAL<span>ERT</span></a>
  <div class="nav-right">
    <a href="https://healert.io" class="nav-btn">Home</a>
    <a href="index.html" class="nav-btn active">Blog</a>
    <a href="https://github.com/healert-io" target="_blank" rel="noopener" class="nav-btn cta">GitHub</a>
  </div>
</nav>

<div class="article-wrap">
  <div class="post-header" id="post-header">
    <div class="loading">Loading…</div>
  </div>
  <article id="post-body"></article>
</div>

<footer>
  <p>© 2026 Healert OÜ | Hello@healert.io</p>
  <p class="foot-eresidency">
    <svg class="foot-flag" viewBox="0 0 30 19" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <rect width="30" height="6.333" y="0" fill="#0072CE"/>
      <rect width="30" height="6.333" y="6.333" fill="#000000"/>
      <rect width="30" height="6.334" y="12.666" fill="#FFFFFF"/>
    </svg>
    Registered in Estonia via the e-Residency programme
  </p>
  <div class="foot-links">
    <a href="https://www.linkedin.com/company/healert" target="_blank" rel="noopener">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M20.45 20.45h-3.56v-5.57c0-1.33-.02-3.04-1.85-3.04-1.85 0-2.14 1.45-2.14 2.94v5.67H9.35V9h3.41v1.56h.05c.48-.9 1.64-1.85 3.37-1.85 3.6 0 4.27 2.37 4.27 5.46v6.28zM5.34 7.43a2.06 2.06 0 110-4.13 2.06 2.06 0 010 4.13zM7.12 20.45H3.56V9h3.56v11.45zM22.22 0H1.77C.79 0 0 .77 0 1.73v20.54C0 23.22.79 24 1.77 24h20.45c.98 0 1.78-.78 1.78-1.73V1.73C24 .77 23.2 0 22.22 0z"/></svg>
      LinkedIn
    </a>
    <a href="https://github.com/healert-io" target="_blank" rel="noopener">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.3 3.44 9.8 8.21 11.39.6.11.82-.26.82-.58 0-.28-.01-1.04-.02-2.05-3.34.73-4.04-1.61-4.04-1.61-.55-1.39-1.33-1.76-1.33-1.76-1.09-.74.08-.73.08-.73 1.2.09 1.84 1.24 1.84 1.24 1.07 1.83 2.81 1.3 3.5.99.11-.78.42-1.3.76-1.6-2.67-.3-5.47-1.33-5.47-5.93 0-1.31.47-2.38 1.24-3.22-.13-.3-.54-1.52.11-3.18 0 0 1.01-.32 3.3 1.23a11.5 11.5 0 016 0c2.29-1.55 3.3-1.23 3.3-1.23.65 1.66.24 2.88.12 3.18.77.84 1.24 1.91 1.24 3.22 0 4.61-2.81 5.63-5.49 5.92.43.37.81 1.1.81 2.22 0 1.6-.01 2.89-.01 3.29 0 .32.22.7.83.58A12 12 0 0024 12c0-6.63-5.37-12-12-12z"/></svg>
      GitHub
    </a>
  </div>
</footer>

<script>
async function loadPost(){
  const header = document.getElementById('post-header');
  const bodyEl = document.getElementById('post-body');
  const params = new URLSearchParams(window.location.search);
  const slug = params.get('slug');

  if(!slug){
    header.innerHTML = '<div class="loading">No post specified.</div>';
    return;
  }

  try{
    const [manifestRes, mdRes] = await Promise.all([
      fetch('posts.json'),
      fetch('posts/' + slug + '.md')
    ]);
    if(!mdRes.ok) throw new Error('Post file not found: ' + slug);

    const manifest = await manifestRes.json();
    const meta = manifest.find(p => p.slug === slug) || {};
    const mdText = await mdRes.text();

    document.getElementById('page-title').textContent = (meta.title || slug) + ' — Healert';
    document.getElementById('page-desc').setAttribute('content', meta.excerpt || '');

    const tags = (meta.tags||[]).map(t => `<span class="tag">${t}</span>`).join('');
    const date = meta.date ? new Date(meta.date).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}) : '';
    header.innerHTML = `
      <div class="tags">${tags}</div>
      <div class="post-meta"><span>${date}</span><span class="dot">·</span><span>${meta.readTime || ''}</span><span class="dot">·</span><span>${meta.author || ''}</span></div>
    `;

    bodyEl.innerHTML = marked.parse(mdText);
  } catch(err){
    header.innerHTML = '<div class="loading">Could not load this post.</div>';
    console.error(err);
  }
}
loadPost();
</script>
</body>
</html>
